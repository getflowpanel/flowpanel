services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fp
      POSTGRES_PASSWORD: fp
      POSTGRES_DB: with_clerk
    ports:
      - "54330:5432"
    volumes:
      - with_clerk_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fp -d with_clerk"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  with_clerk_data:
