services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowpanel_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    tmpfs:
      - "/var/lib/postgresql/data"
    command: ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off"]
