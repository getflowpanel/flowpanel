name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Unit tests + build (Node 18/20/22 × PostgreSQL 13/15/16) ──────────────
  test:
    name: test (node ${{ matrix.node }}, pg ${{ matrix.postgres }})
    strategy:
      matrix:
        node: ["18", "20", "22"]
        postgres: ["13", "15", "16"]
        os: [ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_DB: flowpanel_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/flowpanel_test
          POSTGRES_VERSION: ${{ matrix.postgres }}

  # ── E2E tests (runs after matrix passes) ─────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !cancelled() && needs.test.result != 'failure' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: packages/e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

  # ── macOS smoke test (main branch only) ───────────────────────────────────
  macos:
    name: macOS smoke test
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

  # ── Chaos tests (main branch only, PostgreSQL 16) ─────────────────────────
  chaos:
    name: Chaos tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowpanel_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run chaos tests
        run: pnpm test:chaos
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/flowpanel_test
