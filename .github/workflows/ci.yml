name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  # ── Build + typecheck + unit tests (runs once) ───────────────────────────
  check:
    name: Build & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test:unit

      - uses: actions/cache/save@v4
        with:
          path: packages/*/dist
          key: dist-${{ github.sha }}

  # ── Integration test (always: node 20 × pg 16) ───────────────────────────
  integration:
    name: integration
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowpanel_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache/restore@v4
        with:
          path: packages/*/dist
          key: dist-${{ github.sha }}
      - run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/flowpanel_test

  # ── Full integration matrix (main only) ──────────────────────────────────
  integration-full:
    name: integration (node ${{ matrix.node }}, pg ${{ matrix.postgres }})
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
        postgres: ["13", "16"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_DB: flowpanel_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/flowpanel_test

  # ── E2E tests against freelance-radar ────────────────────────────────────
  # Boots the actual freelance-radar example with a real Postgres service,
  # runs db:push + seed, then runs Playwright (config in packages/e2e/
  # spawns `pnpm --filter freelance-radar dev` as its webServer).
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: freelance_radar
          POSTGRES_USER: fp
          POSTGRES_PASSWORD: fp
        ports: ["54329:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://fp:fp@localhost:54329/freelance_radar
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=0 pnpm install --frozen-lockfile

      - uses: actions/cache/restore@v4
        with:
          path: packages/*/dist
          key: dist-${{ github.sha }}

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: packages/e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: packages/e2e
        run: pnpm exec playwright install-deps chromium

      - name: Apply Drizzle schema to freelance-radar DB
        working-directory: examples/freelance-radar
        run: pnpm db:push

      - name: Seed freelance-radar DB
        working-directory: examples/freelance-radar
        run: pnpm db:seed

      - name: Run Playwright (boots freelance-radar via webServer)
        working-directory: packages/e2e
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

  # ── macOS smoke test (main only) ─────────────────────────────────────────
  macos:
    name: macOS smoke test
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:unit

  # ── Chaos tests (main only) ──────────────────────────────────────────────
  chaos:
    name: Chaos tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowpanel_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:chaos
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/flowpanel_test
